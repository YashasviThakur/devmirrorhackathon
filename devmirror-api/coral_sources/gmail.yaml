name: gmail
version: 0.1.0
dsl_version: 3
description: "Query Gmail messages, threads, labels, and profile using SQL."
backend: http

inputs:
  GMAIL_ACCESS_TOKEN:
    kind: secret
    hint: "Google OAuth2 access token with gmail.readonly scope."

base_url: "https://gmail.googleapis.com/gmail/v1"

auth:
  type: HeaderAuth
  headers:
    - name: Authorization
      from: template
      template: "Bearer {{input.GMAIL_ACCESS_TOKEN}}"

request_headers:
  - name: Accept
    from: literal
    value: application/json

test_queries:
  - SELECT emailAddress FROM gmail.profile LIMIT 1

tables:

  - name: profile
    description: "Gmail user profile."
    request:
      method: GET
      path: /users/me/profile
    response:
      rows_path: []
    columns:
      - name: emailAddress
        type: Utf8
      - name: messagesTotal
        type: Int64
      - name: threadsTotal
        type: Int64

  - name: labels
    description: "Gmail labels including INBOX, SENT, SPAM, and user labels."
    request:
      method: GET
      path: /users/me/labels
    response:
      rows_path: [labels]
    columns:
      - name: id
        type: Utf8
      - name: name
        type: Utf8
      - name: type
        type: Utf8

  - name: messages
    description: "Gmail messages. Filter with q using Gmail search syntax."
    request:
      method: GET
      path: /users/me/messages
      query:
        - name: q
          from: filter
          key: q
        - name: maxResults
          from: literal
          value: "50"
    response:
      rows_path: [messages]
      allow_404_empty: true
    filters:
      - name: q
        type: Utf8
        description: "Gmail search query e.g. subject:internship is:unread"
    columns:
      - name: id
        type: Utf8
      - name: threadId
        type: Utf8

  - name: threads
    description: "Gmail threads with snippet preview."
    request:
      method: GET
      path: /users/me/threads
      query:
        - name: q
          from: filter
          key: q
        - name: maxResults
          from: literal
          value: "50"
    response:
      rows_path: [threads]
      allow_404_empty: true
    filters:
      - name: q
        type: Utf8
        description: "Gmail search query e.g. subject:internship from:recruiter"
    columns:
      - name: id
        type: Utf8
      - name: snippet
        type: Utf8
      - name: historyId
        type: Utf8
