name: codeforces
version: 0.1.0
dsl_version: 3
description: "Query Codeforces competitive programming data using SQL."
backend: http

inputs:
  CODEFORCES_HANDLE:
    kind: variable
    hint: "Your Codeforces handle e.g. yashasvithakur2005"

base_url: "https://codeforces.com"

test_queries:
  - SELECT handle, rating, rank FROM codeforces.user_info LIMIT 1

tables:

  - name: user_info
    description: "Codeforces user profile including rating, rank, and max rating."
    request:
      method: GET
      path: /api/user.info
      query:
        - name: handles
          from: template
          template: "{{input.CODEFORCES_HANDLE}}"
    response:
      rows_path: [result]
    columns:
      - name: handle
        type: Utf8
      - name: rating
        type: Int64
      - name: rank
        type: Utf8
      - name: max_rating
        type: Int64
        expr:
          kind: path
          path: [maxRating]
      - name: max_rank
        type: Utf8
        expr:
          kind: path
          path: [maxRank]
      - name: contribution
        type: Int64
      - name: country
        type: Utf8
      - name: organization
        type: Utf8
      - name: avatar
        type: Utf8

  - name: submissions
    description: "Submission history for the configured handle."
    request:
      method: GET
      path: /api/user.status
      query:
        - name: handle
          from: template
          template: "{{input.CODEFORCES_HANDLE}}"
        - name: from
          from: literal
          value: "1"
        - name: count
          from: literal
          value: "500"
    response:
      rows_path: [result]
    columns:
      - name: id
        type: Int64
      - name: contest_id
        type: Int64
        expr:
          kind: path
          path: [contestId]
      - name: verdict
        type: Utf8
      - name: language
        type: Utf8
        expr:
          kind: path
          path: [programmingLanguage]
      - name: time_consumed_millis
        type: Int64
        expr:
          kind: path
          path: [timeConsumedMillis]
      - name: submitted_at
        type: Int64
        expr:
          kind: path
          path: [creationTimeSeconds]
      - name: problem_name
        type: Utf8
        expr:
          kind: path
          path: [problem, name]
      - name: problem_index
        type: Utf8
        expr:
          kind: path
          path: [problem, index]
      - name: problem_rating
        type: Int64
        expr:
          kind: path
          path: [problem, rating]

  - name: rating_history
    description: "Contest participation history with rating changes."
    request:
      method: GET
      path: /api/user.rating
      query:
        - name: handle
          from: template
          template: "{{input.CODEFORCES_HANDLE}}"
    response:
      rows_path: [result]
    columns:
      - name: contest_id
        type: Int64
        expr:
          kind: path
          path: [contestId]
      - name: contest_name
        type: Utf8
        expr:
          kind: path
          path: [contestName]
      - name: rank
        type: Int64
      - name: old_rating
        type: Int64
        expr:
          kind: path
          path: [oldRating]
      - name: new_rating
        type: Int64
        expr:
          kind: path
          path: [newRating]
      - name: rated_at
        type: Int64
        expr:
          kind: path
          path: [ratingUpdateTimeSeconds]

  - name: contests
    description: "All Codeforces contests — upcoming and finished."
    request:
      method: GET
      path: /api/contest.list
      query:
        - name: gym
          from: literal
          value: "false"
    response:
      rows_path: [result]
    columns:
      - name: id
        type: Int64
      - name: name
        type: Utf8
      - name: type
        type: Utf8
      - name: phase
        type: Utf8
      - name: duration_seconds
        type: Int64
        expr:
          kind: path
          path: [durationSeconds]
      - name: start_time_seconds
        type: Int64
        expr:
          kind: path
          path: [startTimeSeconds]
