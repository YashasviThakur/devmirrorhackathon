name: youtube
version: 0.1.0
dsl_version: 3
description: "Query YouTube liked videos, playlists, and channel stats using SQL."
backend: http

inputs:
  YOUTUBE_ACCESS_TOKEN:
    kind: secret
    hint: "Google OAuth2 access token with youtube.readonly scope."

base_url: "https://www.googleapis.com/youtube/v3"

auth:
  type: HeaderAuth
  headers:
    - name: Authorization
      from: template
      template: "Bearer {{input.YOUTUBE_ACCESS_TOKEN}}"

request_headers:
  - name: Accept
    from: literal
    value: application/json

test_queries:
  - SELECT video_id, title FROM youtube.liked_videos LIMIT 1

tables:

  - name: liked_videos
    description: "Videos liked by the authenticated user, most recently liked first."
    request:
      method: GET
      path: /playlistItems
      query:
        - name: part
          from: literal
          value: snippet
        - name: playlistId
          from: literal
          value: LL
        - name: maxResults
          from: literal
          value: "50"
    response:
      rows_path: [items]
    columns:
      - name: video_id
        type: Utf8
        expr:
          kind: path
          path: [snippet, resourceId, videoId]
      - name: title
        type: Utf8
        expr:
          kind: path
          path: [snippet, title]
      - name: channel_title
        type: Utf8
        expr:
          kind: path
          path: [snippet, videoOwnerChannelTitle]
      - name: liked_at
        type: Utf8
        expr:
          kind: path
          path: [snippet, publishedAt]
      - name: position
        type: Int64
        expr:
          kind: path
          path: [snippet, position]
      - name: thumbnail_url
        type: Utf8
        expr:
          kind: path
          path: [snippet, thumbnails, default, url]
      - name: playlist_item_id
        type: Utf8
        expr:
          kind: path
          path: [id]

  - name: playlists
    description: "Playlists created by the authenticated user."
    request:
      method: GET
      path: /playlists
      query:
        - name: part
          from: literal
          value: snippet,contentDetails,status
        - name: mine
          from: literal
          value: "true"
        - name: maxResults
          from: literal
          value: "50"
    response:
      rows_path: [items]
    columns:
      - name: id
        type: Utf8
      - name: title
        type: Utf8
        expr:
          kind: path
          path: [snippet, title]
      - name: item_count
        type: Int64
        expr:
          kind: path
          path: [contentDetails, itemCount]
      - name: privacy_status
        type: Utf8
        expr:
          kind: path
          path: [status, privacyStatus]

  - name: channels
    description: "The authenticated user's YouTube channel stats."
    request:
      method: GET
      path: /channels
      query:
        - name: part
          from: literal
          value: snippet,statistics
        - name: mine
          from: literal
          value: "true"
    response:
      rows_path: [items]
    columns:
      - name: id
        type: Utf8
      - name: title
        type: Utf8
        expr:
          kind: path
          path: [snippet, title]
      - name: subscriber_count
        type: Int64
        expr:
          kind: path
          path: [statistics, subscriberCount]
      - name: video_count
        type: Int64
        expr:
          kind: path
          path: [statistics, videoCount]
      - name: view_count
        type: Int64
        expr:
          kind: path
          path: [statistics, viewCount]
